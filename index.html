<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>シッテムの箱</title>
<style>
  body { text-align:center; font-family:sans-serif; margin:0; padding:0; }

  .mainArea {
    display:flex;
    justify-content:center;
    align-items:flex-start;
    gap:20px;
    margin-top:20px;
  }

  /* ★ PC向けキャンバスサイズを明示的に指定 */
  canvas#board {
    width: 900px;
    height: 600px;
    border:1px solid #333;
    touch-action:none;
    background-size:cover;
  }

  button {
    margin:5px;
    padding:12px 20px;
    font-size:16px;
  }

  #counter {
    margin-top:10px;
    font-size:18px;
  }

  .max { color:red; font-weight:bold; }

  #coordPanel {
    text-align:left;
    padding:10px;
    border:1px solid #aaa;
    border-radius:8px;
    background:#fafafa;
    width:260px;
  }

  #coordPanel input {
    width:60px;
    margin:3px;
  }

  .description {
    width:90%;
    max-width:900px;
    margin:30px auto;
    text-align:left;
    line-height:1.6;
  }
</style>
</head>
<body>

<h2>シッテムの箱</h2>

<button id="toggleColor">現在：赤 → 青に切替</button>
<button id="toggleLine">線の表示 ON/OFF</button>
<button id="reset">リセット</button>
<button id="saveImage">画像保存</button>

<br>

<button id="modeToggle">① SP用</button>

<select id="subSelect" style="margin-left:10px;">
  <option value="sp_attack">攻撃SP</option>
  <option value="sp_buff">バフSP</option>
</select>

<div id="counter">
  赤: <span id="redCount">0</span> / 4　
  青: <span id="blueCount">0</span> / 4
</div>

<div class="mainArea">
  <div style="flex-shrink:0;">
    <canvas id="board"></canvas>
  </div>

  <div id="coordPanel">
    <h3>座標一覧 / 編集（中央原点）</h3>
    <div id="coordList"></div>
    <button id="applyCoords">座標を反映</button>
  </div>
</div>

<div class="description">
  <h3>ツールの使い方</h3>
  <p>このツールは、戦術対抗戦の部隊配置を視覚的に確認するためのものです。</p>
  <p>肝心のマップが歪んでいるため現在調整中です。</p>
</div>

<script>
const canvas = document.getElementById("board");
const ctx = canvas.getContext("2d");

// 背景画像
const bg = new Image();
bg.src = "background.png";

// マップ画像（3567×2400）
const mapBase = new Image();
mapBase.src = "S10 map.png";

const mapMask = new Image();
mapMask.src = "S10 map 遮蔽.png";

let mode = "red";
let showLines = true;

let redPoints = [];
let bluePoints = [];

let dragging = false;
let dragTarget = null;

let selectedPoint = null;

let modeCategory = 1;
let spMode = "sp_attack";
let stMode = "st_buffer";

let lastTapTime = 0;
let longPressTimer = null;

/* ★★★ PC向け：CSSサイズを内部バッファに反映する */
function resizeCanvas() {
  const rect = canvas.getBoundingClientRect();
  canvas.width = rect.width;   // 900
  canvas.height = rect.height; // 600

  draw();
  updateCoordPanel();
}

window.addEventListener("resize", resizeCanvas);
resizeCanvas();
// ===== 描画 =====
function draw() {
  ctx.clearRect(0,0,canvas.width,canvas.height);

  // 背景画像
  ctx.drawImage(bg, 0, 0, canvas.width, canvas.height);

  // ★ PC向け：マップ画像（3567×2400）を適切に縮小して中央に配置
  const aspect = 3567 / 2400; // 元画像のアスペクト比
  const mapW = canvas.width * 0.9; // 810px
  const mapH = mapW / aspect;      // ≒ 545px

  const mx = (canvas.width - mapW) / 2;
  const my = (canvas.height - mapH) / 2;

  // 下のマップ
  if (mapBase.complete) ctx.drawImage(mapBase, mx, my, mapW, mapH);

  // 上の遮蔽マップ（半透明 50%）
  if (mapMask.complete) {
    ctx.save();
    ctx.globalAlpha = 0.5;
    ctx.drawImage(mapMask, mx, my, mapW, mapH);
    ctx.restore();
  }

  // 赤点
  for (let i = 0; i < redPoints.length; i++) {
    const p = redPoints[i];
    ctx.fillStyle = "red";
    ctx.beginPath();
    ctx.arc(p.x, p.y, 10, 0, Math.PI*2);
    ctx.fill();

    ctx.fillStyle = "white";
    ctx.font = "14px sans-serif";
    ctx.fillText(i+1, p.x-4, p.y+5);
  }

  // 青点
  for (let i = 0; i < bluePoints.length; i++) {
    const p = bluePoints[i];
    ctx.fillStyle = "blue";
    ctx.beginPath();
    ctx.arc(p.x, p.y, 10, 0, Math.PI*2);
    ctx.fill();

    ctx.fillStyle = "white";
    ctx.font = "14px sans-serif";
    ctx.fillText(i+1, p.x-4, p.y+5);
  }

  const cRed = centroid(redPoints);
  const cBlue = centroid(bluePoints);

  if (cRed) drawCross(cRed.x, cRed.y, 10, "pink");
  if (cBlue) drawCross(cBlue.x, cBlue.y, 10, "lightblue");

  // ===== SP用 =====
  if (modeCategory === 1) {

    if (spMode === "sp_attack") {
      if (cRed) {
        const t = nearest(cRed, bluePoints);
        if (t) {
          drawCircle(t.x, t.y, "pink");
          if (showLines) {
            ctx.strokeStyle = "purple";
            ctx.beginPath();
            ctx.moveTo(cRed.x, cRed.y);
            ctx.lineTo(t.x, t.y);
            ctx.stroke();
          }
        }
      }
      if (cBlue) {
        const t = nearest(cBlue, redPoints);
        if (t) {
          drawCircle(t.x, t.y, "lightblue");
          if (showLines) {
            ctx.strokeStyle = "green";
            ctx.beginPath();
            ctx.moveTo(cBlue.x, cBlue.y);
            ctx.lineTo(t.x, t.y);
            ctx.stroke();
          }
        }
      }
    }

    if (spMode === "sp_buff") {
      if (cRed) {
        const t = nearest(cRed, redPoints);
        if (t) drawCircle(t.x, t.y, "rgba(255,150,150,0.5)");
      }
      if (cBlue) {
        const t = nearest(cBlue, bluePoints);
        if (t) drawCircle(t.x, t.y, "rgba(100,150,255,0.5)");
      }
    }
  }

  // ===== ST用 =====
  if (modeCategory === 2 && selectedPoint) {
    const p = selectedPoint;
    const sameList = p.color === "red" ? redPoints : bluePoints;
    const enemyList = p.color === "red" ? bluePoints : redPoints;

    if (stMode === "st_buffer") {
      const t = nearest(p, sameList, true);
      if (t) drawCircle(t.x, t.y, "rgba(255,255,0,0.6)");
    }

    if (stMode === "st_attacker") {
      const t = nearest(p, enemyList);
      if (t) {
        drawCircle(
          t.x,
          t.y,
          p.color === "red"
            ? "rgba(255,0,0,0.6)"
            : "rgba(0,0,255,0.6)"
        );
      }
    }

    if (stMode === "st_hanako") {
      const t = nearest(p, enemyList);
      if (t) {
        const fillColor = p.color === "red"
          ? "rgba(255,0,0,0.3)"
          : "rgba(0,0,255,0.3)";

        const radius = 180;
        const angle = Math.PI / 3;
        const half = angle / 2;

        const baseAngle = Math.atan2(t.y - p.y, t.x - p.x);
        const startAngle = baseAngle - half;
        const endAngle = baseAngle + half;

        ctx.beginPath();
        ctx.moveTo(p.x, p.y);
        ctx.arc(p.x, p.y, radius, startAngle, endAngle);
        ctx.closePath();
        ctx.fillStyle = fillColor;
        ctx.fill();
      }
    }
  }
}

function drawCross(x, y, size, color) {
  ctx.strokeStyle = color;
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(x-size, y-size);
  ctx.lineTo(x+size, y+size);
  ctx.moveTo(x+size, y-size);
  ctx.lineTo(x-size, y+size);
  ctx.stroke();
}

function drawCircle(x, y, color) {
  ctx.strokeStyle = color;
  ctx.lineWidth = 4;
  ctx.beginPath();
  ctx.arc(x, y, 16, 0, Math.PI*2);
  ctx.stroke();
}

// ===== UIイベント =====
document.getElementById("modeToggle").onclick = () => {
  modeCategory = (modeCategory === 1) ? 2 : 1;

  const btn = document.getElementById("modeToggle");
  const sub = document.getElementById("subSelect");

  sub.innerHTML = "";

  if (modeCategory === 1) {
    btn.textContent = "① SP用";
    sub.appendChild(new Option("攻撃SP", "sp_attack"));
    sub.appendChild(new Option("バフSP", "sp_buff"));
    spMode = "sp_attack";
  } else {
    btn.textContent = "② ST用";
    sub.appendChild(new Option("バフ", "st_buffer"));
    sub.appendChild(new Option("アタッカー", "st_attacker"));
    sub.appendChild(new Option("ハナコ（水着）", "st_hanako"));
    stMode = "st_buffer";
  }

  draw();
};

// サブ機能切り替え
document.getElementById("subSelect").onchange = (e) => {
  const v = e.target.value;
  if (v === "sp_attack" || v === "sp_buff") spMode = v;
  if (v === "st_buffer" || v === "st_hanako" || v === "st_attacker")
    stMode = v;
  draw();
};

document.getElementById("toggleColor").onclick = () => {
  mode = (mode === "red") ? "blue" : "red";
  document.getElementById("toggleColor").textContent =
    `現在：${mode === "red" ? "赤" : "青"} → ${mode === "red" ? "青" : "赤"}に切替`;
};

document.getElementById("toggleLine").onclick = () => {
  showLines = !showLines;
  draw();
};

document.getElementById("reset").onclick = () => {
  redPoints = [];
  bluePoints = [];
  selectedPoint = null;
  updateCounter();
  draw();
  updateCoordPanel();
};

document.getElementById("saveImage").onclick = () => {
  const link = document.createElement("a");
  link.download = "tactics.png";
  link.href = canvas.toDataURL("image/png");
  link.click();
};

bg.onload = () => {
  draw();
  updateCoordPanel();
};
</script>

</body>
</html>
