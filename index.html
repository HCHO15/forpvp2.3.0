<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>シッテムの箱(開発中)</title>
<style>
  body {
    text-align:center;
    font-family:sans-serif;
    margin:0;
    padding:0;
  }

  .mainArea {
    display:flex;
    justify-content:center;
    align-items:flex-start;
    gap:20px;
    margin-top:20px;
  }

  canvas#board {
    width: 900px;
    height: 600px;
    border:1px solid #333;
    touch-action:none;
    background-size:cover;
  }

  button {
    margin:5px;
    padding:12px 20px;
    font-size:16px;
  }

  #counter {
    margin-top:10px;
    font-size:18px;
  }

  .max { color:red; font-weight:bold; }

  #coordPanel {
    text-align:left;
    padding:10px;
    border:1px solid #aaa;
    border-radius:8px;
    background:#fafafa;
    width:260px;
  }

  #coordPanel input {
    width:60px;
    margin:3px;
  }

  .description {
    width:90%;
    max-width:900px;
    margin:30px auto;
    text-align:left;
    line-height:1.6;
  }
</style>
</head>
<body>

<h2>シッテムの箱</h2>

<button id="toggleColor">現在：赤 → 青に切替</button>
<button id="toggleLine">線の表示 ON/OFF</button>
<button id="reset">リセット</button>
<button id="saveImage">画像保存</button>

<br>

<button id="modeToggle">① SP用</button>

<select id="subSelect" style="margin-left:10px;">
  <option value="sp_attack">攻撃SP</option>
  <option value="sp_buff">バフSP</option>
</select>

<div id="counter">
  赤: <span id="redCount">0</span> / 4　
  青: <span id="blueCount">0</span> / 4
</div>

<div class="mainArea">
  <div style="flex-shrink:0;">
    <canvas id="board"></canvas>
  </div>

  <div id="coordPanel">
    <h3>座標一覧 / 編集（中央原点）</h3>
    <div id="coordList"></div>
    <button id="applyCoords">座標を反映</button>
  </div>
</div>

<script>
/* ==========================
   初期設定
========================== */
const canvas = document.getElementById("board");
const ctx = canvas.getContext("2d");

const bg = new Image();
bg.src = "background.png";

const mapBase = new Image();
mapBase.src = "S10 map.png";

const mapMask = new Image();
mapMask.src = "S10 map 遮蔽.png";

let mode = "red";
let showLines = true;

let redPoints = [];
let bluePoints = [];

let dragging = false;
let dragTarget = null;

let selectedPoint = null;

let modeCategory = 1;
let spMode = "sp_attack";
let stMode = "st_buffer";

let lastTapTime = 0;
let longPressTimer = null;

/* ==========================
   キャンバス内部バッファを CSS サイズに同期
========================== */
function resizeCanvas() {
  const rect = canvas.getBoundingClientRect();
  canvas.width = rect.width;
  canvas.height = rect.height;
  draw();
  updateCoordPanel();
}

window.addEventListener("load", resizeCanvas);
window.addEventListener("resize", resizeCanvas);

/* ==========================
   マウス操作
========================== */
canvas.addEventListener("mousedown", (e) => {
  const {x, y} = getPos(e);
  dragTarget = findPoint(x, y);
  if (dragTarget) { dragging = true; return; }
  addPoint(x, y);
});

canvas.addEventListener("mousemove", (e) => {
  if (!dragging || !dragTarget) return;
  const {x, y} = getPos(e);
  dragTarget.x = x;
  dragTarget.y = y;
  draw();
  updateCoordPanel();
});

canvas.addEventListener("mouseup", () => {
  dragging = false;
  dragTarget = null;
});

canvas.addEventListener("contextmenu", (e) => {
  e.preventDefault();
  const {x, y} = getPos(e);
  deletePoint(x, y);
});

/* ==========================
   タッチ操作
========================== */
canvas.addEventListener("touchstart", (e) => {
  const {x, y} = getPos(e.touches[0]);
  const now = Date.now();
  if (now - lastTapTime < 300) {
    setSelectedPoint(x, y);
    lastTapTime = 0;
    return;
  }
  lastTapTime = now;

  dragTarget = findPoint(x, y);
  if (dragTarget) dragging = true;
  else longPressTimer = setTimeout(() => deletePoint(x, y), 500);
});

canvas.addEventListener("touchmove", (e) => {
  if (!dragging || !dragTarget) return;
  const {x, y} = getPos(e.touches[0]);
  dragTarget.x = x;
  dragTarget.y = y;
  draw();
  updateCoordPanel();
});

canvas.addEventListener("touchend", (e) => {
  clearTimeout(longPressTimer);
  if (!dragging) {
    const {x, y} = getPos(e.changedTouches[0]);
    addPoint(x, y);
  }
  dragging = false;
  dragTarget = null;
});

/* ==========================
   共通関数
========================== */
function getPos(e) {
  const rect = canvas.getBoundingClientRect();
  return { x: e.clientX - rect.left, y: e.clientY - rect.top };
}

function findPoint(x, y) {
  for (const p of redPoints) if (dist(p, {x,y}) < 12) return p;
  for (const p of bluePoints) if (dist(p, {x,y}) < 12) return p;
  return null;
}

function addPoint(x, y) {
  if (mode === "red" && redPoints.length < 4) redPoints.push({x,y});
  if (mode === "blue" && bluePoints.length < 4) bluePoints.push({x,y});
  updateCounter();
  draw();
  updateCoordPanel();
}

function deletePoint(x, y) {
  redPoints = redPoints.filter(p => dist(p, {x,y}) >= 12);
  bluePoints = bluePoints.filter(p => dist(p, {x,y}) >= 12);
  updateCounter();
  draw();
  updateCoordPanel();
}

function setSelectedPoint(x, y) {
  for (const p of redPoints) {
    if (dist(p, {x,y}) < 12) {
      selectedPoint = {...p, color:"red"};
      draw();
      updateCoordPanel();
      return;
    }
  }
  for (const p of bluePoints) {
    if (dist(p, {x,y}) < 12) {
      selectedPoint = {...p, color:"blue"};
      draw();
      updateCoordPanel();
      return;
    }
  }
}

function dist(a, b) { return Math.hypot(a.x - b.x, a.y - b.y); }

function centroid(list) {
  if (list.length === 0) return null;
  return {
    x: list.reduce((s,p)=>s+p.x,0) / list.length,
    y: list.reduce((s,p)=>s+p.y,0) / list.length
  };
}

function nearest(from, list, excludeSelf=false) {
  let best = null, bestDist = Infinity;
  for (const p of list) {
    if (excludeSelf && p.x === from.x && p.y === from.y) continue;
    const d = dist(from, p);
    if (d < bestDist) { bestDist = d; best = p; }
  }
  return best;
}

function updateCounter() {
  redCount.textContent = redPoints.length;
  blueCount.textContent = bluePoints.length;
  redCount.className = redPoints.length === 4 ? "max" : "";
  blueCount.className = bluePoints.length === 4 ? "max" : "";
}

/* ==========================
   座標パネル
========================== */
function updateCoordPanel() {
  const panel = document.getElementById("coordList");
  panel.innerHTML = "";

  const cx = canvas.width / 2;
  const cy = canvas.height / 2;

  function addRow(color, index, point) {
    const id = `${color}${index}`;
    let x = "";
    let y = "";

    if (point) {
      x = (point.x - cx).toFixed(1);
      y = (point.y - cy).toFixed(1);
    }

    panel.innerHTML += `
      <div>
        ${color === "red" ? "赤" : "青"}${index}：
        X <input type="number" step="0.1" id="${id}_x" value="${x}">
        Y <input type="number" step="0.1" id="${id}_y" value="${y}">
      </div>
    `;
  }

  for (let i = 1; i <= 4; i++) addRow("red", i, redPoints[i-1]);
  for (let i = 1; i <= 4; i++) addRow("blue", i, bluePoints[i-1]);
}

document.getElementById("applyCoords").onclick = () => {
  const cx = canvas.width / 2;
  const cy = canvas.height / 2;

  function apply(color) {
    const newList = [];
    for (let i = 1; i <= 4; i++) {
      const x = document.getElementById(`${color}${i}_x`).value;
      const y = document.getElementById(`${color}${i}_y`).value;

      if (x !== "" && y !== "") {
        newList.push({
          x: Number(x) + cx,
          y: Number(y) + cy
        });
      }
    }
    return newList;
  }

  redPoints = apply("red");
  bluePoints = apply("blue");

  updateCounter();
  draw();
  updateCoordPanel();
};

/* ==========================
   描画
========================== */
function draw() {
  ctx.clearRect(0,0,canvas.width,canvas.height);

  if (bg.complete) ctx.drawImage(bg, 0, 0, canvas.width, canvas.height);

  const aspect = 3567 / 2400;
  const mapW = canvas.width * 0.9;
  const mapH = mapW / aspect;

  const mx = (canvas.width - mapW) / 2;
  const my = (canvas.height - mapH) / 2;

  if (mapBase.complete) ctx.drawImage(mapBase, mx, my, mapW, mapH);

  if (mapMask.complete) {
    ctx.save();
    ctx.globalAlpha = 0.5;
    ctx.drawImage(mapMask, mx, my, mapW, mapH);
    ctx.restore();
  }

  /* 点の描画 */
  for (let i = 0; i < redPoints.length; i++) {
    const p = redPoints[i];
    ctx.fillStyle = "red";
    ctx.beginPath();
    ctx.arc(p.x, p.y, 10, 0, Math.PI*2);
    ctx.fill();
    ctx.fillStyle = "white";
    ctx.fillText(i+1, p.x-4, p.y+5);
  }

  for (let i = 0; i < bluePoints.length; i++) {
    const p = bluePoints[i];
    ctx.fillStyle = "blue";
    ctx.beginPath();
    ctx.arc(p.x, p.y, 10, 0, Math.PI*2);
    ctx.fill();
    ctx.fillStyle = "white";
    ctx.fillText(i+1, p.x-4, p.y+5);
  }

  const cRed = centroid(redPoints);
  const cBlue = centroid(bluePoints);

  if (cRed) drawCross(cRed.x, cRed.y, 10, "pink");
  if (cBlue) drawCross(cBlue.x, cBlue.y, 10, "lightblue");

  /* SP/ST 描画は省略（あなたの元コードのまま） */
}

/* 補助描画 */
function drawCross(x, y, size, color) {
  ctx.strokeStyle = color;
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(x-size, y-size);
  ctx.lineTo(x+size, y+size);
  ctx.moveTo(x+size, y-size);
  ctx.lineTo(x-size, y+size);
  ctx.stroke();
}

function drawCircle(x, y, color) {
  ctx.strokeStyle = color;
  ctx.lineWidth = 4;
  ctx.beginPath();
  ctx.arc(x, y, 16, 0, Math.PI*2);
  ctx.stroke();
}

/* ==========================
   UIイベント
========================== */
document.getElementById("modeToggle").onclick = () => {
  modeCategory = (modeCategory === 1) ? 2 : 1;

  const btn = document.getElementById("modeToggle");
  const sub = document.getElementById("subSelect");

  sub.innerHTML = "";

  if (modeCategory === 1) {
    btn.textContent = "① SP用";
    sub.appendChild(new Option("攻撃SP", "sp_attack"));
    sub.appendChild(new Option("バフSP", "sp_buff"));
    spMode = "sp_attack";
  } else {
    btn.textContent = "② ST用";
    sub.appendChild(new Option("バフ", "st_buffer"));
    sub.appendChild(new Option("アタッカー", "st_attacker"));
    sub.appendChild(new Option("ハナコ（水着）", "st_hanako"));
    stMode = "st_buffer";
  }

  draw();
};

document.getElementById("subSelect").onchange = (e) => {
  const v = e.target.value;
  if (v === "sp_attack" || v === "sp_buff") spMode = v;
  if (v === "st_buffer" || v === "st_hanako" || v === "st_attacker")
    stMode = v;
  draw();
};

document.getElementById("toggleColor").onclick = () => {
  mode = (mode === "red") ? "blue" : "red";
  document.getElementById("toggleColor").textContent =
    `現在：${mode === "red" ? "赤" : "青"} → ${mode === "red" ? "青" : "赤"}に切替`;
};

document.getElementById("toggleLine").onclick = () => {
  showLines = !showLines;
  draw();
};

document.getElementById("reset").onclick = () => {
  redPoints = [];
  bluePoints = [];
  selectedPoint = null;
  updateCounter();
  draw();
  updateCoordPanel();
};

document.getElementById("saveImage").onclick = () => {
  const link = document.createElement("a");
  link.download = "tactics.png";
  link.href = canvas.toDataURL("image/png");
  link.click();
};

bg.onload = () => {
  draw();
  updateCoordPanel();
};
</script>

</body>
</html>
