<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>シッテムの箱 - forbapvp1.0.0</title>

  <style>
    body {
      font-family: system-ui, sans-serif;
      margin: 0;
      padding: 16px;
      background: #f5f5f5;
    }
    h1 {
      margin-top: 0;
      font-size: 20px;
    }

    .container {
      display: flex;
      gap: 16px;
    }

    .left-panel {
      display: flex;
      flex-direction: column;
      gap: 10px;
      width: 820px;
    }

    .controls {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    #canvasWrapper {
      background: #fff;
      padding: 8px;
      border-radius: 4px;
      box-shadow: 0 0 4px rgba(0,0,0,0.1);
    }

    #mainCanvas {
      border: 1px solid #ccc;
      background: #ffffff;
      cursor: crosshair;
    }

    .counts {
      font-size: 13px;
      margin-left: 4px;
    }

    .right-panel {
      background: #fff;
      padding: 8px;
      border-radius: 4px;
      box-shadow: 0 0 4px rgba(0,0,0,0.1);
      min-width: 260px;
    }

    table {
      border-collapse: collapse;
      width: 100%;
      margin-bottom: 8px;
      font-size: 12px;
    }
    th, td {
      border: 1px solid #ccc;
      padding: 2px 4px;
      text-align: center;
    }
    th {
      background: #f0f0f0;
    }

    #rangeControls {
      display: none;
      margin-top: 6px;
      font-size: 12px;
    }
    #rangeControls input, #rangeControls select {
      margin-left: 4px;
    }
  </style>
</head>

<body>
  <h1>シッテムの箱</h1>
  
  <div class="container">
    <div class="left-panel">

      <div class="controls">
        <button id="btnColor">現在：赤 → 青に切り替え</button>
        <button id="btnReset">リセット</button>
        <button id="btnSave">画像保存</button>

        <select id="modeSelect">
          <option value="0">攻撃SP</option>
          <option value="1">バフSP</option>
          <option value="2">攻撃ST</option>
          <option value="3">バフST</option>
          <option value="4">範囲確認</option>
        </select>
      </div>

      <div id="rangeControls">
        <div>
          半径(m)：
          <input type="range" id="radiusSlider" min="50" max="1200" step="10" value="700">
          <span id="radiusValue">700</span>

          <select id="shortcutSelect">
            <option value="manual">手動</option>
            <option value="yuzuEX">ユズEX</option>
            <option value="yuzuNS">ユズNS</option>
            <option value="atsukoEX">アツコEX</option>
            <option value="atsukoNS">アツコNS</option>
            <option value="koharuMizugiEX">コハル（水着）EX</option>
            <option value="sakiEX">サキEX</option>
            <option value="sumireEX">スミレEX</option>
            <option value="cherinoEX">チェリノEX</option>
            <option value="tsubaki">ツバキEX</option>
            <option value="nagisaEX">ナギサEX</option>
            <option value="nonomiEX">ノノミEX</option>
            <option value="hanako">ハナコ（水着）EX</option>
            <option value="hinaMizugi">ヒナ（水着）EX</option>
            <option value="hoshinoEX">ホシノ（臨戦）EX</option>
            <option value="hoshinoSS">ホシノ（臨戦）SS</option>
            <option value="minoriEX">ミノリEX</option>
            <option value="minoriNS">ミノリNS</option>
            <option value="reisaEX">レイサEX</option>
            <option value="reisaMagicEX">レイサ（マジカル）EX</option>
            <option value="yakumo">ヤクモEX</option>
          </select>
        </div>

        <div>
          角度(°)：
          <input type="number" id="angleInput" min="1" max="360" value="360">
        </div>
      </div>

      <div class="counts" id="countsDisplay">
        赤点：0/4　青点：0/4
      </div>

      <div id="canvasWrapper">
        <canvas id="mainCanvas" width="800" height="520"></canvas>
      </div>

    </div>

    <div class="right-panel">
      <div class="table-title">赤点座標</div>
      <table>
        <thead>
          <tr><th>#</th><th>x</th><th>y</th><th>基準</th></tr>
        </thead>
        <tbody id="redTableBody"></tbody>
      </table>

      <div class="table-title">青点座標</div>
      <table>
        <thead>
          <tr><th>#</th><th>x</th><th>y</th><th>基準</th></tr>
        </thead>
        <tbody id="blueTableBody"></tbody>
      </table>
    </div>
  </div>

<!-- ▼▼▼ ここから JavaScript（Part 2 を続けて貼る） ▼▼▼ -->
<script>
/* =========================
   基本設定
========================= */
const canvas = document.getElementById("mainCanvas");
const ctx = canvas.getContext("2d");
const width = canvas.width;
const height = canvas.height;

const originX = width / 2;
const originY = height / 2;

const btnColor = document.getElementById("btnColor");
const btnReset = document.getElementById("btnReset");
const btnSave = document.getElementById("btnSave");
const modeSelect = document.getElementById("modeSelect");

const rangeControls = document.getElementById("rangeControls");
const radiusSlider = document.getElementById("radiusSlider");
const radiusValue = document.getElementById("radiusValue");
const angleInput = document.getElementById("angleInput");
const shortcutSelect = document.getElementById("shortcutSelect");

const countsDisplay = document.getElementById("countsDisplay");
const redTableBody = document.getElementById("redTableBody");
const blueTableBody = document.getElementById("blueTableBody");

const MAX_POINTS = 4;
const POINT_RADIUS = 10;
const HIT_RADIUS = 12;

const COLOR_RED = "#e53935";
const COLOR_BLUE = "#1e88e5";
const COLOR_RED_LIGHT = "rgba(229,57,53,0.55)";
const COLOR_BLUE_LIGHT = "rgba(30,136,229,0.55)";

let modeIndex = 0;
let currentColor = "red";

let redPoints = [];
let bluePoints = [];

let draggingPoint = null;
let dragOffsetX = 0;
let dragOffsetY = 0;
let isDragging = false;

let basePoint = null;

/* =========================
   背景画像
========================= */
const bgImage = new Image();
bgImage.src = "S10 map.png";
let bgLoaded = false;
bgImage.onload = () => { bgLoaded = true; redraw(); };

const bgImage2 = new Image();
bgImage2.src = "S10 map 遮蔽.png";
let bg2Loaded = false;
bgImage2.onload = () => { bg2Loaded = true; redraw(); };

/* =========================
   座標変換
========================= */
function logicalToCanvas(x, y) {
  return { cx: originX + x, cy: originY - y };
}
function canvasToLogical(cx, cy) {
  return { x: cx - originX, y: originY - cy };
}

/* =========================
   テーブル生成
========================= */
function initTables() {
  for (let i = 1; i <= MAX_POINTS; i++) {
    const redRow = document.createElement("tr");
    redRow.innerHTML = `
      <td>${i}</td>
      <td><input class="coord-input" data-color="red" data-id="${i}" data-axis="x"></td>
      <td><input class="coord-input" data-color="red" data-id="${i}" data-axis="y"></td>
      <td><input type="radio" name="redBase" data-color="red" data-id="${i}"></td>
    `;
    redTableBody.appendChild(redRow);

    const blueRow = document.createElement("tr");
    blueRow.innerHTML = `
      <td>${i}</td>
      <td><input class="coord-input" data-color="blue" data-id="${i}" data-axis="x"></td>
      <td><input class="coord-input" data-color="blue" data-id="${i}" data-axis="y"></td>
      <td><input type="radio" name="blueBase" data-color="blue" data-id="${i}"></td>
    `;
    blueTableBody.appendChild(blueRow);
  }

  document.querySelectorAll(".coord-input").forEach(input =>
    input.addEventListener("change", onCoordInputChange)
  );

  document.querySelectorAll("input[type=radio]").forEach(r =>
    r.addEventListener("change", onBaseSelect)
  );
}

function onBaseSelect(e) {
  const color = e.target.dataset.color;
  const id = parseInt(e.target.dataset.id, 10);
  basePoint = { color, id };
  redraw();
}

function onCoordInputChange(e) {
  const input = e.target;
  const color = input.dataset.color;
  const id = parseInt(input.dataset.id, 10);
  const axis = input.dataset.axis;
  const value = parseFloat(input.value);
  if (isNaN(value)) return;

  let arr = color === "red" ? redPoints : bluePoints;
  let p = arr.find(pt => pt.id === id);

  if (!p) {
    if (arr.length >= MAX_POINTS) {
      updateTablesFromPoints();
      return;
    }
    p = { id, color, x: 0, y: 0 };
    arr.push(p);
  }

  p[axis] = value;
  redraw();
  updateTablesFromPoints();
  updateCounts();
}

function updateTablesFromPoints() {
  document.querySelectorAll(".coord-input").forEach(i => i.value = "");

  redPoints.forEach(p => {
    document.querySelector(`.coord-input[data-color="red"][data-id="${p.id}"][data-axis="x"]`).value = Math.round(p.x);
    document.querySelector(`.coord-input[data-color="red"][data-id="${p.id}"][data-axis="y"]`).value = Math.round(p.y);
  });

  bluePoints.forEach(p => {
    document.querySelector(`.coord-input[data-color="blue"][data-id="${p.id}"][data-axis="x"]`).value = Math.round(p.x);
    document.querySelector(`.coord-input[data-color="blue"][data-id="${p.id}"][data-axis="y"]`).value = Math.round(p.y);
  });
}

/* =========================
   点操作
========================= */
function getNextId(arr) {
  for (let i = 1; i <= MAX_POINTS; i++) {
    if (!arr.find(p => p.id === i)) return i;
  }
  return null;
}

function addPoint(color, x, y) {
  const arr = color === "red" ? redPoints : bluePoints;
  if (arr.length >= MAX_POINTS) return;
  const id = getNextId(arr);
  arr.push({ id, color, x, y });
}

function removePoint(p) {
  if (p.color === "red") redPoints = redPoints.filter(x => x !== p);
  else bluePoints = bluePoints.filter(x => x !== p);

  if (basePoint && basePoint.color === p.color && basePoint.id === p.id) {
    basePoint = null;
  }
}

function findPointAtCanvasPos(cx, cy) {
  const all = redPoints.concat(bluePoints);
  for (let i = all.length - 1; i >= 0; i--) {
    const p = all[i];
    const { cx: px, cy: py } = logicalToCanvas(p.x, p.y);
    const dx = cx - px;
    const dy = cy - py;
    if (Math.sqrt(dx * dx + dy * dy) <= HIT_RADIUS) return p;
  }
  return null;
}

/* =========================
   描画ユーティリティ
========================= */
function clearCanvas() {
  ctx.clearRect(0, 0, width, height);

  if (bgLoaded) ctx.drawImage(bgImage, 0, 0, width, height);
  if (bg2Loaded) ctx.drawImage(bgImage2, 0, 0, width, height);
}

function drawPoint(p) {
  const { cx, cy } = logicalToCanvas(p.x, p.y);

  ctx.save();
  ctx.fillStyle = p.color === "red" ? COLOR_RED : COLOR_BLUE;
  ctx.beginPath();
  ctx.arc(cx, cy, POINT_RADIUS, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();
}

function drawHighlightCircle(p, color) {
  if (!p) return;
  const { cx, cy } = logicalToCanvas(p.x, p.y);

  ctx.save();
  ctx.strokeStyle = color;
  ctx.lineWidth = 4;
  ctx.beginPath();
  ctx.arc(cx, cy, POINT_RADIUS + 6, 0, Math.PI * 2);
  ctx.stroke();
  ctx.restore();
}

function drawCentroidMark(arr, color) {
  if (!arr.length) return;
  const c = computeCentroid(arr);
  const { cx, cy } = logicalToCanvas(c.x, c.y);

  ctx.save();
  ctx.strokeStyle = color;
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(cx - 8, cy);
  ctx.lineTo(cx + 8, cy);
  ctx.moveTo(cx, cy - 8);
  ctx.lineTo(cx, cy + 8);
  ctx.stroke();
  ctx.restore();
}

/* =========================
   重心
========================= */
function computeCentroid(arr) {
  if (!arr.length) return null;
  let sx = 0, sy = 0;
  arr.forEach(p => { sx += p.x; sy += p.y; });
  return { x: sx / arr.length, y: sy / arr.length };
}

/* =========================
   距離計算
========================= */
function dist2(a, b) {
  const dx = a.x - b.x;
  const dy = a.y - b.y;
  return dx * dx + dy * dy;
}

function findNearest(from, arr) {
  if (!arr.length) return null;
  let best = null;
  let bestD = Infinity;
  arr.forEach(p => {
    const d = dist2(from, p);
    if (d < bestD) {
      bestD = d;
      best = p;
    }
  });
  return best;
}

/* =========================
   扇の中心候補
========================= */
function getNearestOppositePoint(fromPoint) {
  const others = fromPoint.color === "red" ? bluePoints : redPoints;
  return findNearest(fromPoint, others);
}

function getNearestOppositeFromSameColorCentroid(basePoint) {
  const sameArr = basePoint.color === "red" ? redPoints : bluePoints;
  const centroid = computeCentroid(sameArr);
  if (!centroid) return null;

  const others = basePoint.color === "red" ? bluePoints : redPoints;
  return findNearest(centroid, others);
}
/* =========================
   扇の向き（中心点から最も近い敵方向）
========================= */
function getSectorDirection(center, color) {
  const others = color === "red" ? bluePoints : redPoints;
  if (others.length === 0) return 0;

  const nearest = findNearest(center, others);
  if (!nearest) return 0;

  return Math.atan2(-(nearest.y - center.y), nearest.x - center.x);
}

/* =========================
   範囲確認：描画（新仕様）
========================= */
function drawRangeAttack() {
  if (!basePoint) return;

  const arrSelf = basePoint.color === "red" ? redPoints : bluePoints;
  const self = arrSelf.find(p => p.id === basePoint.id);
  if (!self) return;

  let radiusRaw = parseFloat(radiusSlider.value);
  let angleDeg = parseFloat(angleInput.value);

  const v = shortcutSelect.value;

  const preset = {
    yuzuEX:        [200, 360, "nearestOpp"],
    yuzuNS:        [100, 360, "self"],
    atsukoEX:      [500, 360, "self"],
    atsukoNS:      [150, 360, "self"],
    koharuMizugiEX:[200, 360, "nearestOpp"],
    sakiEX:        [100, 360, "nearestOpp"],
    sumireEX:      [400, 45,  "self"],
    cherinoEX:     [1000,360, "self"],
    nagisaEX:      [250, 360, "centroidOpp"],
    nonomiEX:      [950, 60,  "nearestOpp"],
    hinaMizugi:    [950, 90,  "self"],
    minoriEX:      [300, 360, "centroidOpp"],
    minoriNS:      [300, 360, "centroidOpp"],
    reisaEX:       [700, 90,  "self"],
    reisaMagicEX:  [2000,360, "self"],
    tsubaki:       [700, 360, "self"],
    hanako:        [850, 60,  "self"],
    hoshinoEX:     [300, 360, "self"],
    hoshinoSS:     [850, 30,  "self"],
    yakumo:        [510, 360, "centroidOpp"]
  };

  if (preset[v]) {
    radiusRaw = preset[v][0];
    angleDeg = preset[v][1];
  }

  const centerRule = preset[v] ? preset[v][2] : "self";

  let centerPoint = self;

  if (centerRule === "nearestOpp") {
    const p = getNearestOppositePoint(self);
    if (p) centerPoint = p;
  }

  if (centerRule === "centroidOpp") {
    const p = getNearestOppositeFromSameColorCentroid(self);
    if (p) centerPoint = p;
  }

  const scale = 290 / 700;
  const radius = radiusRaw * scale;
  const angleRad = angleDeg * Math.PI / 180;

  const { cx, cy } = logicalToCanvas(centerPoint.x, centerPoint.y);
  const color = centerPoint.color === "red" ? COLOR_RED_LIGHT : COLOR_BLUE_LIGHT;

  ctx.save();
  ctx.fillStyle = color;

  if (angleDeg >= 360) {
    ctx.beginPath();
    ctx.arc(cx, cy, radius, 0, Math.PI * 2);
    ctx.fill();
  } else {
    const centerAngle = getSectorDirection(centerPoint, centerPoint.color);
    const start = centerAngle - angleRad / 2;
    const end = centerAngle + angleRad / 2;

    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.arc(cx, cy, radius, start, end);
    ctx.closePath();
    ctx.fill();
  }

  ctx.restore();
}

/* =========================
   サブ機能
========================= */
function applyAttackSP() {
  const redC = computeCentroid(redPoints);
  const blueC = computeCentroid(bluePoints);

  if (redC && bluePoints.length) {
    drawHighlightCircle(findNearest(redC, bluePoints), COLOR_RED_LIGHT);
  }
  if (blueC && redPoints.length) {
    drawHighlightCircle(findNearest(blueC, redPoints), COLOR_BLUE_LIGHT);
  }
}

function applyBuffSP() {
  const redC = computeCentroid(redPoints);
  const blueC = computeCentroid(bluePoints);

  if (redC && redPoints.length >= 2) {
    drawHighlightCircle(findNearest(redC, redPoints), COLOR_RED_LIGHT);
  }
  if (blueC && bluePoints.length >= 2) {
    drawHighlightCircle(findNearest(blueC, bluePoints), COLOR_BLUE_LIGHT);
  }
}

function applyAttackST() {
  if (!basePoint) return;

  const arrSelf = basePoint.color === "red" ? redPoints : bluePoints;
  const arrOther = basePoint.color === "red" ? bluePoints : redPoints;

  const self = arrSelf.find(p => p.id === basePoint.id);
  if (!self || !arrOther.length) return;

  drawHighlightCircle(findNearest(self, arrOther),
    basePoint.color === "red" ? COLOR_RED_LIGHT : COLOR_BLUE_LIGHT);
}

function applyBuffST() {
  if (!basePoint) return;

  const arrSelf = basePoint.color === "red" ? redPoints : bluePoints;
  const self = arrSelf.find(p => p.id === basePoint.id);
  if (!self || arrSelf.length < 2) return;

  const others = arrSelf.filter(p => p.id !== basePoint.id);
  drawHighlightCircle(findNearest(self, others),
    basePoint.color === "red" ? COLOR_RED_LIGHT : COLOR_BLUE_LIGHT);
}

function applySubFunction() {
  drawCentroidMark(redPoints, COLOR_RED_LIGHT);
  drawCentroidMark(bluePoints, COLOR_BLUE_LIGHT);

  if (modeIndex === 0) applyAttackSP();
  if (modeIndex === 1) applyBuffSP();
  if (modeIndex === 2) applyAttackST();
  if (modeIndex === 3) applyBuffST();
  if (modeIndex === 4) drawRangeAttack();
}

/* =========================
   再描画
========================= */
function redraw() {
  clearCanvas();
  redPoints.forEach(drawPoint);
  bluePoints.forEach(drawPoint);
  applySubFunction();
}

/* =========================
   UI・イベント
========================= */
modeSelect.addEventListener("change", () => {
  modeIndex = parseInt(modeSelect.value, 10);
  rangeControls.style.display = modeIndex === 4 ? "block" : "none";
  redraw();
});

radiusSlider.addEventListener("input", () => {
  radiusValue.textContent = radiusSlider.value;
  shortcutSelect.value = "manual";
  redraw();
});

angleInput.addEventListener("input", () => {
  shortcutSelect.value = "manual";
  redraw();
});

/* =========================
   プリセット保存
========================= */
function getCurrentCoordinates() {
  return {
    red: [1,2,3,4].map(id => {
      const p = redPoints.find(pt => pt.id === id);
      return p ? { x: Math.round(p.x), y: Math.round(p.y) } : { x: 0, y: 0 };
    }),
    blue: [1,2,3,4].map(id => {
      const p = bluePoints.find(pt => pt.id === id);
      return p ? { x: Math.round(p.x), y: Math.round(p.y) } : { x: 0, y: 0 };
    })
  };
}

function applyPresetData(data) {
  redPoints = [];
  bluePoints = [];

  data.red.forEach((p, i) => {
    if (p.x !== 0 || p.y !== 0)
      redPoints.push({ id: i+1, color: "red", x: p.x, y: p.y });
  });

  data.blue.forEach((p, i) => {
    if (p.x !== 0 || p.y !== 0)
      bluePoints.push({ id: i+1, color: "blue", x: p.x, y: p.y });
  });

  basePoint = null;
  redraw();
  updateTablesFromPoints();
  updateCounts();
}

function loadPresets() {
  document.querySelectorAll(".preset-block").forEach(block => {
    const id = block.dataset.id;
    const nameInput = block.querySelector(".preset-name");
    const dataPre = block.querySelector(".preset-data");

    const saved = localStorage.getItem("preset_" + id);
    if (saved) {
      const obj = JSON.parse(saved);
      nameInput.value = obj.name;
      dataPre.textContent = JSON.stringify(obj.data, null, 2);
    }
  });
}

function savePreset(id, name, data) {
  localStorage.setItem("preset_" + id, JSON.stringify({ name, data }));
}

document.querySelectorAll(".preset-save").forEach(btn => {
  btn.addEventListener("click", e => {
    const block = e.target.closest(".preset-block");
    const id = block.dataset.id;
    const name = block.querySelector(".preset-name").value;

    const data = getCurrentCoordinates();
    savePreset(id, name, data);

    block.querySelector(".preset-data").textContent =
      JSON.stringify(data, null, 2);

    alert("プリセット " + name + " を保存しました");
  });
});

document.querySelectorAll(".preset-apply").forEach(btn => {
  btn.addEventListener("click", e => {
    const block = e.target.closest(".preset-block");
    const id = block.dataset.id;

    const saved = localStorage.getItem("preset_" + id);
    if (!saved) {
      alert("プリセットが保存されていません");
      return;
    }

    const obj = JSON.parse(saved);
    applyPresetData(obj.data);
  });
});

document.querySelectorAll(".preset-delete").forEach(btn => {
  btn.addEventListener("click", e => {
    if (!confirm("本当に削除しますか？")) return;

    const block = e.target.closest(".preset-block");
    const id = block.dataset.id;

    localStorage.removeItem("preset_" + id);
    block.querySelector(".preset-data").textContent = "";

    alert("削除しました");
  });
});

/* =========================
   初期化
========================= */
initTables();
loadPresets();
redraw();

</script>
</body>
</html>
